<!DOCTYPE html>

<title>arXiv ar5iv LaTeXML code listing (slice from 2504.20838 Appendix A)</title>
<!--
  Hand-stripped slice from arxiv.org/html/2504.20838 ("Bitcoin, a DAO?"),
  Appendix A. LaTeXML / ar5iv render a `lstlisting` code block as

      div.ltx_listing
        div.ltx_listing_data > a[download][href="data:text/plain;base64,…"]  (the ⬇ icon)
        div.ltx_listingline > span.ltx_tag_listingline (line number gutter)
                              + span.ltx_font_typewriter  (one per TOKEN)
                              + span.ltx_lst_space         (one per SPACE)

  There is NO <pre>. Before the ltx_listing handler, the generic container
  walk treated every inline token span as its own block and exploded each
  word onto its own paragraph ("PROMPT_TEMPLATE" / "=" / "As" / "an" / …).
  The handler must instead emit ONE monospace paragraph per ltx_listingline,
  dropping the line-number gutter and the ⬇ download-data link.

  Spans are kept ADJACENT (no whitespace between </span><span>) exactly as
  the real ar5iv HTML emits them — real spacing lives in ltx_lst_space spans.

  Sentinels ("PROMPT_TEMPLATE", "Your task is to:") are verbatim from the
  paper. ⬇ (U+2B07) is the forbidden sentinel: it must NOT leak into the body.

  Line 4 ("general_sentiment_score":) is the soft-wrap sentinel: the token is
  exactly 26 chars, so the prose-default soft-wrap (CODE_SOFTWRAP_MIN regime)
  would inject U+200B into it and corrupt copy-paste. The "general_sentiment_
  score" required-needle is a CONTIGUOUS substring only when the listing
  threshold (64) leaves the identifier byte-clean — it fails if listing runs
  are wrapped at the prose threshold (26).
-->
</head>
