# SPEC §13.1 fixture #4 — Excel-Tables auto-detect (§4.3): `table:T1` and
# `table:T1[Hours]` resolve via the Table's own header definition in
# xl/tables/tableN.xml, independent of cell-grid headers.
id: 4
name: excel-table-data
shape: with-table
rules_format: json
xfail: false   # 003.14b orchestrator end-to-end works; promoted from xfail
sheet:
  name: Sheet1
  table:
    name: Timesheet1
    range: A1:B4   # header row + 3 data rows
    headers: [Hours, Project]
  data:
    - [8,   "PRJ-1"]
    - [10,  "PRJ-2"]
    - [9,   "PRJ-3"]
rules: |
  {
    "version": 1,
    "rules": [
      {
        "id": "tbl-positive",
        "scope": "table:Timesheet1[Hours]",
        "check": "value > 0",
        "severity": "error"
      }
    ]
  }
expected:
  exit_code: 0
  summary:
    errors: 0
  required_rule_ids: []
  forbidden_rule_ids: []
