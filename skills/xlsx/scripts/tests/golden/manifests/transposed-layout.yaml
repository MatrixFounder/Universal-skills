# SPEC §13.1 fixture #6 — documented honest-scope error (R13.h): xlsx-7 does
# NOT auto-detect transposed layouts (labels in column A, values flowing
# right). The rule `col:Hours` resolves "Hours" as the row-1 header at A1;
# the data range below A1 is column A row 2 = "Project" (text). The
# comparison `value > 0` against the text fails (type mismatch ≡ False),
# so the rule fires on A2 — the WRONG cell. The user wanted to check B2 (=8).
# The honest-scope lock here is that xlsx-7 misfires on the column-A label
# instead of validating B2; locked by `required_rule_ids: [tp-hours-positive]`
# AND `expected.exit_code: 1` (rule fired) — NOT a silent skip.
id: 6
name: transposed-layout
shape: simple-grid
rules_format: json
xfail: false   # 003.14b orchestrator wires end-to-end; misfire is the documented honest-scope behavior
sheet:
  name: Sheet1
  cells:
    # Column A holds row labels (transposed)
    A1: { type: header, value: "Hours" }
    A2: { type: header, value: "Project" }
    # Column B holds the actual values (transposed)
    B1: { type: number, value: 8 }
    B2: { type: text,   value: "PRJ-1234" }
rules: |
  {
    "version": 1,
    "rules": [
      {
        "id": "tp-hours-positive",
        "scope": "col:Hours",
        "check": "value > 0",
        "severity": "error"
      }
    ]
  }
expected:
  exit_code: 1          # Rule fires on A2 (text "Project") because `value > 0` against text fails per SPEC §5.1.
  summary:
    errors: 1
  required_rule_ids: [tp-hours-positive]    # Rule fires on the WRONG cell (A2 instead of B2) — the honest-scope misfire.
  forbidden_rule_ids: []
