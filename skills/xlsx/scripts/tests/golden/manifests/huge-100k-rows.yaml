# SPEC §13.1 fixture #31 — perf contract anchor.
#
# 100K rows × 10 columns. Generated by `_generate.py
# --regenerate-perf-fixture` (deterministic seed: random.seed(42))
# via openpyxl.Workbook(write_only=True). NOT regenerated by
# `--all` (too expensive; ~8–15 s on a modern machine).
#
# Q5 hybrid storage: COMMITTED (allow-listed in tests/golden/inputs/.gitignore)
# so CI doesn't have to regenerate on every run. Re-generate manually
# when the rules-shape changes (the manifest's content, NOT the workbook).
#
# Perf contract (SPEC §11.2):
#     huge-100k-rows.xlsx × 5-rule.rules.json ≤ 30 s wall-clock
#     AND ≤ 500 MB peak RSS on a 4-core machine.
# CI: gated by RUN_PERF_TESTS=1 env var; not run by default.
id: 31
name: huge-100k-rows
shape: perf-fixture   # builder dispatches to --regenerate-perf-fixture
rules_format: json
xfail: false
sheet:
  name: Sheet1
  # Generator builds the workbook from the column-list below; data
  # is randomised with random.seed(42) for determinism.
  columns: [Date, Hours, Project, Status, Notes,
            WeekNum, Department, Approved, Cost, Manager]
  rows: 100000
  noise_pct: 5      # 5 % out-of-range / blank cells to give the rules something to find
rules: |
  {
    "version": 1,
    "defaults": {"sheet": "Sheet1"},
    "rules": [
      {"id": "hours-realistic", "scope": "col:Hours",
       "check": "value <= 24", "severity": "error"},
      {"id": "hours-positive", "scope": "col:Hours",
       "check": "value > 0", "severity": "error"},
      {"id": "approved-status", "scope": "col:Status",
       "check": "value in [Approved, Pending, Rejected]", "severity": "error"},
      {"id": "project-format", "scope": "col:Project",
       "check": "regex:^PRJ-\\d{4}$", "severity": "warning"},
      {"id": "totals-sum", "scope": "col:Cost",
       "check": "value >= 0", "severity": "error"}
    ]
  }
expected:
  exit_code: 1   # 5 % noise guarantees at least some violations
  required_rule_ids: []
  forbidden_rule_ids: []
  perf_gated: true   # only validated under RUN_PERF_TESTS=1
