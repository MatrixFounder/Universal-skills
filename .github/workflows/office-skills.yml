name: office-skills

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "skills/docx/**"
      - "skills/xlsx/**"
      - "skills/pptx/**"
      - "skills/pdf/**"
      - "tests/**"
      - ".github/workflows/office-skills.yml"
  workflow_dispatch:
    inputs:
      update_goldens:
        description: "Regenerate visual-regression goldens and upload as artifact"
        required: false
        default: "false"

jobs:
  skill:
    name: ${{ matrix.skill }}
    strategy:
      fail-fast: false
      matrix:
        skill: [docx, xlsx, pptx, pdf]
    runs-on: ubuntu-22.04
    env:
      STRICT_VISUAL: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice \
            poppler-utils \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libfontconfig1 libffi-dev \
            fonts-dejavu fonts-noto-core fonts-liberation \
            imagemagick

      - name: Cache per-skill venv + node_modules
        uses: actions/cache@v4
        with:
          path: |
            skills/${{ matrix.skill }}/scripts/.venv
            skills/${{ matrix.skill }}/scripts/node_modules
          key: ${{ runner.os }}-skill-${{ matrix.skill }}-${{ hashFiles(format('skills/{0}/scripts/requirements.txt', matrix.skill), format('skills/{0}/scripts/package.json', matrix.skill)) }}

      - name: install.sh
        run: bash skills/${{ matrix.skill }}/scripts/install.sh

      - name: validate_skill
        run: python3 skills/skill-creator/scripts/validate_skill.py skills/${{ matrix.skill }}

      - name: Regenerate goldens (workflow_dispatch only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' }}
        env:
          UPDATE_GOLDENS: "1"
          STRICT_VISUAL: "0"
        run: bash skills/${{ matrix.skill }}/scripts/tests/test_e2e.sh

      - name: E2E
        run: bash skills/${{ matrix.skill }}/scripts/tests/test_e2e.sh

      - name: Upload regenerated goldens
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: goldens-${{ matrix.skill }}
          path: tests/visual/goldens/${{ matrix.skill }}/
          if-no-files-found: warn

  property:
    name: property fuzz
    needs: skill
    runs-on: ubuntu-22.04
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice poppler-utils \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libfontconfig1 libffi-dev \
            fonts-dejavu fonts-noto-core fonts-liberation

      - name: Bootstrap docx + pdf + xlsx skills
        run: |
          for s in docx pdf xlsx; do
              bash skills/$s/scripts/install.sh
          done

      - name: Bootstrap property venv
        run: bash tests/property/setup.sh

      - name: Run hypothesis fuzz suite
        run: tests/property/.venv/bin/pytest tests/property -q --tb=short
