name: office-skills

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "skills/docx/**"
      - "skills/xlsx/**"
      - "skills/pptx/**"
      - "skills/pdf/**"
      - "tests/**"
      - ".github/workflows/office-skills.yml"
  workflow_dispatch:
    inputs:
      update_goldens:
        description: "Regenerate visual-regression goldens and upload as artifact"
        required: false
        default: "false"

jobs:
  skill:
    name: ${{ matrix.skill }}
    strategy:
      fail-fast: false
      matrix:
        skill: [docx, xlsx, pptx, pdf]
    runs-on: ubuntu-22.04
    env:
      STRICT_VISUAL: "1"
      # @mermaid-js/mermaid-cli@11.x uses puppeteer-core which does NOT
      # bundle Chromium. Without an explicit browser path, the CLI fails
      # with "could not compute launch arguments". Point it at the
      # apt-installed chromium-browser binary so mermaid renders fenced
      # ```mermaid blocks to PNG (md2pdf, md2pptx mermaid tests).
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice \
            poppler-utils \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libfontconfig1 libffi-dev \
            fonts-dejavu fonts-noto-core fonts-liberation \
            imagemagick \
            chromium-browser

      - name: Cache per-skill venv + node_modules
        uses: actions/cache@v4
        with:
          path: |
            skills/${{ matrix.skill }}/scripts/.venv
            skills/${{ matrix.skill }}/scripts/node_modules
          key: ${{ runner.os }}-skill-${{ matrix.skill }}-${{ hashFiles(format('skills/{0}/scripts/requirements.txt', matrix.skill), format('skills/{0}/scripts/package.json', matrix.skill)) }}

      - name: install.sh
        run: bash skills/${{ matrix.skill }}/scripts/install.sh

      - name: validate_skill
        run: python3 skills/skill-creator/scripts/validate_skill.py skills/${{ matrix.skill }}

      - name: Regenerate goldens (workflow_dispatch only)
        # `continue-on-error: true` so unrelated test failures (e.g. docx
        # tier-2 fallback, pdf battery on stale Ubuntu signatures) don't
        # abort the artifact upload. Goldens are written in-place by the
        # script BEFORE those failing tests run; we want them out as
        # artifacts regardless.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' }}
        continue-on-error: true
        env:
          UPDATE_GOLDENS: "1"
          STRICT_VISUAL: "0"
        run: bash skills/${{ matrix.skill }}/scripts/tests/test_e2e.sh

      - name: Regenerate pdf battery_signatures (workflow_dispatch only)
        # Synthetic + platform fixtures live in the repo, so they CAN be
        # rendered on Ubuntu CI without tmp/ — the platform-specific
        # baseline (Linux freetype/fontconfig vs macOS CoreText) drifts
        # the same way visual goldens do. Refresh in lockstep.
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' && matrix.skill == 'pdf' }}
        continue-on-error: true
        run: |
          ./skills/pdf/scripts/.venv/bin/python \
            skills/pdf/scripts/tests/capture_signatures.py --refresh

      - name: Upload regenerated goldens
        # Always attempt upload when dispatched — `if: always()` plus the
        # outer dispatch guard. continue-on-error on the regen step alone
        # isn't enough because GitHub Actions skips subsequent steps on
        # earlier failures by default.
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: goldens-${{ matrix.skill }}
          path: tests/visual/goldens/${{ matrix.skill }}/
          if-no-files-found: warn

      - name: Upload regenerated battery_signatures (pdf only)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true' && matrix.skill == 'pdf' }}
        uses: actions/upload-artifact@v4
        with:
          name: battery_signatures-pdf
          path: skills/pdf/scripts/tests/battery_signatures.json
          if-no-files-found: warn

      - name: E2E
        # Final verification step — runs only on regular push/PR (not on
        # update_goldens dispatch, where the regen step already ran the
        # full battery and we just want the artifacts).
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.update_goldens == 'true') }}
        run: bash skills/${{ matrix.skill }}/scripts/tests/test_e2e.sh

  property:
    name: property fuzz
    needs: skill
    runs-on: ubuntu-22.04
    env:
      HYPOTHESIS_PROFILE: ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libreoffice poppler-utils \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0 \
            libfontconfig1 libffi-dev \
            fonts-dejavu fonts-noto-core fonts-liberation

      - name: Bootstrap docx + pdf + xlsx skills
        run: |
          for s in docx pdf xlsx; do
              bash skills/$s/scripts/install.sh
          done

      - name: Bootstrap property venv
        run: bash tests/property/setup.sh

      - name: Run hypothesis fuzz suite
        run: tests/property/.venv/bin/pytest tests/property -q --tb=short
